name: KasmVNC Desktop
on: [workflow_dispatch]

jobs:
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Desktop + Firefox + KasmVNC
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies firefox
          
          # KasmVNC (سبک، بدون AngularJS!)
          wget -q https://github.com/kasmtech/KasmVNC/releases/download/v1.3.3/kasmvncserver_jammy_amd64.deb
          sudo apt install -y ./kasmvncserver_jammy_amd64.deb
          
          # تنظیم رمز عبور VNC
          mkdir -p ~/.vnc
          echo "shadowx" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # اجرای XFCE + KasmVNC روی پورت 8080
          export DISPLAY=:1
          vncserver :1 -geometry 1366x768 -depth 24 -websocketPort 8080
          
          # صبر برای آماده شدن
          sleep 5

      - name: Setup Ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null \
            && echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list \
            && sudo apt update \
            && sudo apt install ngrok
          
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          nohup ngrok http 8080 --request-header-add="ngrok-skip-browser-warning:true" > ngrok.log 2>&1 &
          sleep 10

      - name: Show URL
        run: |
          TUNNEL_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "========================================="
          echo "🌐 Desktop URL: $TUNNEL_URL"
          echo "🔑 VNC Password: shadowx"
          echo "========================================="
          sleep 21600
