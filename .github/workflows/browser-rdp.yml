name: Browser RDP for mhr-rs
on: [workflow_dispatch]

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    # قدم صفر: پروژه رو چک کن
    - name: Checkout code
      uses: actions/checkout@v4

    # قدم اول: عکس سیستم عامل موقت رو بساز
    - name: Build RDP image
      run: docker build -t my-rdp-image .

    # قدم دوم: سیستمعامل ما رو اجرا کن
    - name: Run RDP container
      run: |
        docker run -d \
          --name rdp-host \
          -p 3389:3389 \
          my-rdp-image
    
    # قدم سوم: سرویس "مترجم" گوآکامول رو اجرا کن
    - name: Run Guacamole Server (guacd)
      run: |
        docker run -d \
          --name guacd \
          guacamole/guacd

    # قدم چهارم: رابط کاربری گوآکامول رو اجرا کن و به سرویس قبلی وصل کن
    - name: Run Guacamole Web UI
      run: |
        docker run -d \
          --name guacamole-web \
          --link guacd:guacd \
          --link rdp-host \
          -e GUACD_HOSTNAME=guacd \
          -e RDP_HOSTNAME=rdp-host \
          -e RDP_PORT=3389 \
          -p 8080:8080 \
          guacamole/guacamole
        sleep 15
        echo "✅ Guacamole Web UI is ready."

    # قدم پنجم: نصب و راه‌اندازیش دوباره و اصولی Ngrok
    - name: Setup and Start Ngrok Tunnel
      run: |
        # دانلود و نصب ngrok
        wget -q https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip
        unzip -o ngrok-stable-linux-amd64.zip
        # احراز هویت ngrok
        ./ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        # ساخت یک فایل کانفیگ ساده برای ngrok
        echo "web_addr: 0.0.0.0:4040" > ngrok.yml
        # اجرای تونل در پس‌زمینه، اینبار کاملاً پایدار
        nohup ./ngrok http 8080 --config=ngrok.yml --log=stdout > ngrok.log 2>&1 &
        # ۱۰ ثانیه قطعی صبر کن
        sleep 15
        # چاپ لاگ ngrok برای بررسی خطا
        echo "--- Ngrok Log Start ---"
        cat ngrok.log
        echo "--- Ngrok Log End ---"

    # قدم آخر: صبر می‌کنیم تا تونل آماده شود و سپس لینک را نشان می‌دهیم
    - name: Show Connection Info
      run: |
        echo "========================================="
        echo "🌐 تلاش برای یافتن لینک اتصال از API محلی Ngrok..."
        # چند بار تلاش می‌کنیم تا API ngrok آماده شود
        for i in {1..20}; do
          # با خاموش کردن خطا، تلاش می‌کنیم لینک را پیدا کنیم
          TUNNEL_URL=$(curl -s --connect-timeout 2 http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url // empty')
          
          if [ ! -z "$TUNNEL_URL" ]; then
            echo "========================================="
            echo "🌐 لینک اتصال به ریموت شما: $TUNNEL_URL"
            echo "========================================="
            echo "👤 اکانت پیشفرض گوآکامول:"
            echo "   Username: guacadmin"
            echo "   Password: guacadmin"
            echo "========================================="
            # سیستم را ۶ ساعت زنده نگه دار
            sleep 21600
            exit 0
          fi
          echo "منتظر آماده شدن تونل هستیم... (تلاش $i)"
          sleep 5
        done
        
        echo "========================================="
        echo "❌ خطا: تونل Ngrok بعد از ۱۰۰ ثانیه آماده نشد."
        echo "--- آخرین وضعیت لاگ Ngrok ---"
        cat ngrok.log
        echo "--- پایان لاگ ---"
        exit 1
