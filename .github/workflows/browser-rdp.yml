name: Browser RDP for mhr-rs
on: [workflow_dispatch]

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build RDP image
      run: docker build -t my-rdp-image .

    - name: Run RDP container
      run: |
        docker run -d \
          --name rdp-host \
          -p 3389:3389 \
          my-rdp-image
    
    - name: Run Guacamole Server (guacd)
      run: |
        docker run -d \
          --name guacd \
          guacamole/guacd

    # این مرحله رو تغییر دادیم تا هدر ngrok رو اضافه کنه
    - name: Run Guacamole Web UI (با هدر عبور از هشدار Ngrok)
      run: |
        # ساخت یه پوشه موقت
        mkdir -p /tmp/guacamole
        
        # دانلود مستقیم فایل guacamole.war
        docker run --rm guacamole/guacamole cat /opt/guacamole/guacamole.war > /tmp/guacamole/guacamole.war
        
        # اجرای Tomcat با تنظیمات اختصاصی
        docker run -d \
          --name guacamole-web \
          --link guacd:guacd \
          --link rdp-host \
          -e GUACD_HOSTNAME=guacd \
          -e RDP_HOSTNAME=rdp-host \
          -e RDP_PORT=3389 \
          -e JAVA_OPTS="-Dserver.tomcat.remoteip.remote-ip-header=x-forwarded-for" \
          -v /tmp/guacamole/guacamole.war:/opt/tomcat/webapps/guacamole.war \
          -p 8080:8080 \
          tomcat:9.0
          
        sleep 15
        echo "✅ Guacamole Web UI is ready."

    - name: Setup and Start Ngrok Tunnel (Official Apt)
      run: |
        curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
          | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null \
          && echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" \
          | sudo tee /etc/apt/sources.list.d/ngrok.list \
          && sudo apt update \
          && sudo apt install ngrok
        
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        # اضافه کردن هدر برای رد کردن هشدار
        ngrok http 8080 --request-header-add="ngrok-skip-browser-warning:true" > ngrok.log 2>&1 &
        
        sleep 15
        
        echo "--- Ngrok Log Start ---"
        cat ngrok.log
        echo "--- Ngrok Log End ---"

    - name: Show Connection Info
      run: |
        echo "========================================="
        echo "🌐 تلاش برای یافتن لینک اتصال از API محلی Ngrok..."
        for i in {1..20}; do
          TUNNEL_URL=$(curl -s --connect-timeout 2 http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url // empty')
          
          if [ ! -z "$TUNNEL_URL" ]; then
            echo "========================================="
            echo "🌐 لینک اتصال به ریموت شما: $TUNNEL_URL"
            echo "========================================="
            echo "👤 اکانت پیشفرض گوآکامول:"
            echo "   Username: guacadmin"
            echo "   Password: guacadmin"
            echo "========================================="
            sleep 21600
            exit 0
          fi
          echo "منتظر آماده شدن تونل هستیم... (تلاش $i)"
          sleep 5
        done
        
        echo "❌ خطا: تونل Ngrok بعد از ۱۰۰ ثانیه آماده نشد."
        exit 1
