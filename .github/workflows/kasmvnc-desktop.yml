name: Guacamole Desktop
on: [workflow_dispatch]

jobs:
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Run Guacamole + VNC
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies firefox tigervnc-standalone-server docker.io
          
          # VNC
          mkdir -p ~/.vnc
          echo "shadowx" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          vncserver -kill :1 2>/dev/null || true
          vncserver :1 -geometry 1366x768 -depth 24 -localhost yes
          
          # Guacamole + guacd
          sudo docker run -d --name guacd --network host guacamole/guacd
          sudo docker run -d --name guacamole --network host \
            -e GUACD_HOSTNAME=127.0.0.1 \
            -e GUACD_PORT=4822 \
            guacamole/guacamole

      - name: Ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          nohup ngrok http 8080 --request-header-add="ngrok-skip-browser-warning:true" &
          sleep 10

      - name: Show URL
        run: |
          TUNNEL_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "URL: $TUNNEL_URL/guacamole"
          echo "Login: guacadmin / guacadmin"
          sleep 21600
