name: Web Desktop (Fixed)
on: [workflow_dispatch]

jobs:
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Everything
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies firefox tigervnc-standalone-server novnc websockify python3
          
          # تنظیم رمز VNC
          mkdir -p ~/.vnc
          echo "shadowx" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # کشتن VNC قبلی اگه هست
          vncserver -kill :1 2>/dev/null || true
          
          # اجرای VNC روی دیسپلی ۱
          vncserver :1 -geometry 1366x768 -depth 24 -localhost yes
          
          # تست VNC (باید ok بده)
          sleep 3
          echo "=== VNC Status ==="
          vncserver -list
          
          # اجرای websockify برای پل WebSocket
          websockify -D --web=/usr/share/novnc 8080 localhost:5901
          
          # تست websockify
          sleep 2
          echo "=== WebSocket Status ==="
          curl -s http://localhost:8080/ | head -5

      - name: Setup Ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null \
            && echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list \
            && sudo apt update \
            && sudo apt install ngrok
          
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          nohup ngrok http 8080 --request-header-add="ngrok-skip-browser-warning:true" > ngrok.log 2>&1 &
          sleep 10

      - name: Show URL
        run: |
          TUNNEL_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "========================================="
          echo "🌐 Desktop URL: $TUNNEL_URL/vnc.html"
          echo "🔑 VNC Password: shadowx"
          echo ""
          echo "⚠️ اگر خطا دادی، اینارو امتحان کن:"
          echo "  1. یه بار دیگه Run workflow بزن"
          echo "  2. آدرس رو با /vnc_lite.html تست کن"
          echo "========================================="
          sleep 21600
