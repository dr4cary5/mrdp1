name: noVNC Debug
on: [workflow_dispatch]

jobs:
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install + Debug Everything
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies firefox tigervnc-standalone-server novnc websockify python3 net-tools
          
          mkdir -p ~/.vnc
          echo "shadowx" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          vncserver -kill :1 2>/dev/null || true
          vncserver :1 -geometry 1366x768 -depth 24
          
          sleep 3
          
          # تست VNC بدون websockify
          echo "=== Test 1: VNC is running ==="
          timeout 2 nc -zv 127.0.0.1 5901 2>&1
          
          # اجرای websockify با خروجی کامل
          echo "=== Test 2: Starting websockify ==="
          websockify 8080 127.0.0.1:5901 --web=/usr/share/novnc --log-file=/tmp/websockify.log &
          sleep 3
          
          # چک لاگ websockify
          echo "=== Test 3: websockify log ==="
          cat /tmp/websockify.log
          
          # تست websockify
          echo "=== Test 4: HTTP test ==="
          curl -s -I http://127.0.0.1:8080/ 2>&1 | head -5
          
          # چک WebSocket endpoint
          echo "=== Test 5: WebSocket test ==="
          curl -s -H "Upgrade: websocket" -H "Connection: Upgrade" http://127.0.0.1:8080/websockify 2>&1 | head -5

      - name: Ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null \
            && echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list \
            && sudo apt update \
            && sudo apt install ngrok
          
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          nohup ngrok http 8080 --request-header-add="ngrok-skip-browser-warning:true" &
          sleep 10

      - name: Show URL
        run: |
          TUNNEL_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "URL: $TUNNEL_URL/vnc.html"
          echo "or: $TUNNEL_URL/vnc_lite.html"
          echo "Password: shadowx"
          sleep 21600
