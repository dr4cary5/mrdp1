name: VNC Desktop (Test)
on: [workflow_dispatch]

jobs:
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install + Debug
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies firefox tigervnc-standalone-server novnc websockify python3 net-tools
          
          mkdir -p ~/.vnc
          echo "shadowx" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          vncserver -kill :1 2>/dev/null || true
          
          # حذف -localhost تا websockify بتونه وصل بشه
          vncserver :1 -geometry 1366x768 -depth 24
          
          sleep 3
          
          # چک پورت VNC
          echo "=== VNC Port ==="
          netstat -tlnp | grep 5901
          
          # چک پروسه VNC
          echo "=== VNC Process ==="
          ps aux | grep vnc | grep -v grep
          
          # اجرای websockify با پورت جدا
          websockify -D --web=/usr/share/novnc 8080 localhost:5901
          
          sleep 2
          
          # چک websockify
          echo "=== WebSocket Port ==="
          netstat -tlnp | grep 8080

      - name: Ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null \
            && echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list \
            && sudo apt update \
            && sudo apt install ngrok
          
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          nohup ngrok http 8080 --request-header-add="ngrok-skip-browser-warning:true" &
          sleep 10

      - name: Show URL
        run: |
          TUNNEL_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "URL: $TUNNEL_URL/vnc.html"
          echo "Password: shadowx"
          
          # تست لوکال VNC
          echo "=== Testing VNC locally ==="
          timeout 3 nc -zv localhost 5901 2>&1 || echo "VNC not responding"
          timeout 3 curl -s http://localhost:8080/ | head -3 || echo "noVNC not responding"
          
          sleep 21600
